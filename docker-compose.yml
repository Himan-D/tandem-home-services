version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: lumina-postgres
    restart: unless-stopped
    ports:
      - '${PG_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina
      POSTGRES_DB: lumina
    volumes:
      - pg-data:/var/lib/postgresql/data

  osrm:
    image: osrm/osrm-backend:latest
    container_name: lumina-osrm
    restart: unless-stopped
    ports:
      - '${OSRM_PORT:-5000}:5000'
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld /data/new-york-latest.osrm
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: lumina-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data

volumes:
  pg-data:
  redis-data:
